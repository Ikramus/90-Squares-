<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>90 Squares</title>

<style>
body{
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    margin-top:40px;
}

.grid{
    display:grid;
    grid-template-columns: repeat(10, 60px);
    gap:10px;
}

.square{
    border:2px solid #444;
    width:60px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
}

.checked{
    background:#4caf50;
    color:white;
}
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid")

for(let i=1;i<=90;i++){
    const box = document.createElement("div")
    box.className = "square"
    box.textContent = i

    box.onclick = () => {
        box.classList.toggle("checked")
    }

    grid.appendChild(box)
}
</script>

</body>
</html>
